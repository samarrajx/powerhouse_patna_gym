<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="circlePathTop" d="M 40,100 A 60,60 0 0 1 160,100" />
    <path id="circlePathBottom" d="M 40,100 A 60,60 0 0 0 160,100" />
    <style>
      .logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 800; fill: currentColor; text-transform: uppercase; }
      .gear { fill: none; stroke: currentColor; stroke-width: 1.5; }
      .barbell { fill: currentColor; }
    </style>
  </defs>

  <!-- Outer Gear teeth (Simulated with dasharray/offset for now, or true path) -->
  <circle cx="100" cy="100" r="94" class="gear" stroke-dasharray="12 4.4" stroke-width="6" />
  <circle cx="100" cy="100" r="88" class="gear" stroke-width="2" />
  <circle cx="100" cy="100" r="82" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3" />

  <!-- Stars -->
  <text x="32" y="104" class="logo-text" font-size="12">★</text>
  <text x="168" y="104" class="logo-text" font-size="12">★</text>

  <!-- Text -->
  <text class="logo-text" font-size="13" letter-spacing="1">
    <textPath href="#circlePathTop" startOffset="50%" text-anchor="middle">The Power House Gym</textPath>
  </text>
  <text class="logo-text" font-size="10" letter-spacing="2.5">
    <textPath href="#circlePathBottom" startOffset="50%" text-anchor="middle">Dare To Be Great</textPath>
  </text>

  <!-- High-Detail Barbell -->
  <g transform="translate(100, 100)" class="barbell">
    <!-- Shaft -->
    <rect x="-45" y="-1.5" width="90" height="3" />
    <!-- Inner Plates -->
    <rect x="-34" y="-14" width="6" height="28" rx="1" />
    <rect x="-26" y="-10" width="3" height="20" rx="0.5" />
    <!-- Outer Plates -->
    <rect x="28" y="-14" width="6" height="28" rx="1" />
    <rect x="23" y="-10" width="3" height="20" rx="0.5" />
    <!-- End Caps -->
    <circle cx="-45" cy="0" r="2.5" />
    <circle cx="45" cy="0" r="2.5" />
  </g>
</svg>
